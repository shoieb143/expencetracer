<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
    <div class="header-top">
        <div class="brand">
            <span class="brand-logo">Smart Expense Tracker</span>
            <div>
                <h1>Smart Expense tracker</h1>
                <p>Know where every rupee goes</p>
            </div>
        </div>
        <div>
            <button>Login</button>
            <button>Sign up</button>
    </div>
    <div>
        <div>
            <div>Total spent</div>
            <div>0 expenses</div>
        </div>
        <div>
            <div>Food</div>
            <div>0 expenses</div>
        </div>
        <div>
            <div>Travel</div>
            <div>0 expenses</div>
        </div>
        <div>
            <div>Shopping</div>
            <div>0 expenses</div>
        </div>
        <div>
            <div>Bills</div>
            <div>0 expenses</div>
        </div>
    </div>
   </header>
   <main>
    <section>
        <h2>Add new Expense</h2>
        <div>
            <div>
                <label for="">Title</label>
                <input type="text">
            </div>
                <div>
                <label for="">Amount</label>
                <input type="number">
            </div>
            <div>
                <label for="">Category</label>
                <select name="" id="">
                    <option value="">Food</option>
                    <option value="">Travel</option>
                    <option value="">Shopping</option>
                    <option value="">Bills</option>
                </select>
            </div>
            <div>
                <label for="">Date</label>
                <input type="date">
            </div>

        </div>
        <button>Add expense</button>
    </section>

    <section>
        <div>
            <h2>All Expenses</h2>
            <div>
                <button>All</button>
                <button>Food</button>
                <button>Shopping</button>
                <button>Travel</button>
                <button>Bills</button>
            </div>
        </div>
        <div>

            <div>
                <p> No expenses yet.</p>
                <span>Add your first expense above</span>
            </div>
        </div>
    </section>
   </main>

</body>
</html>
